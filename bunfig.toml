telemetry = false

[install]
auto = "disable"
minimumReleaseAge = 259200
minimumReleaseAgeExcludes = [
  "@happy-dom/global-registrator",
  "@types/bun",
  "happy-dom",
  "typescript",
]

[run]
bun = true

[test]
preload = ["./test/setup.ts"]
pathIgnorePatterns = ["dist/**", ".astro/**"]
timeout = 10000
coverageReporter = ["text", "lcov"]
coverageDir = "./reports/coverage"
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  "**/*.d.ts",
  "test/setup.ts",
  "scripts/diagnose-dist.ts",
  "scripts/quality.ts",
]

[test.ci]
coverage = true
coverageThreshold = { lines = 0.8, functions = 0.75, statements = 0.8 }
smol = true
